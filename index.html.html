function Bar({val,color,h=6}){
  return <div style={{flex:1,height:h,background:C.cream,borderRadius:3,overflow:"hidden"}}>
    <div style={{width:`${val}%`,height:"100%",background:color,borderRadius:3,transition:"width .8s"}}/>
  </div>;
}
function SigBadge({sig}){
  const isBuy=sig.includes("BUY"),isSell=sig.includes("SELL");
  const col=isBuy?C.green:isSell?C.red:C.gold;
  return <span style={{display:"inline-block",background:`${col}18`,border:`1px solid ${col}`,
    color:col,fontSize:".58rem",fontFamily:"monospace",padding:"2px 7px",letterSpacing:".05em"}}>{sig}</span>;
}
function CrossTag({text}){
  if(!text) return null;
  return <div style={{display:"inline-block",background:C.goldBg,border:`1px solid ${C.gold}`,
    fontSize:".57rem",fontFamily:"monospace",color:C.gold,padding:"2px 8px",marginTop:6}}>{text}</div>;
}

// TAB 7: AI 실시간 분석
// ══════════════════════════════════════
function TabAI(){
  const [apiKey,setApiKey]=useState("");
  const [status,setStatus]=useState("idle");
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");
  const [step,setStep]=useState(0);
  const steps=["대기","뉴스수집","행위자","사건","주가","완성"];

  async function run(){
    if(!apiKey){setError("API 키를 입력해주세요.");return;}
    setStatus("loading");setError("");setResult(null);
    try{
      const call=async(prompt)=>{
        const r=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,
            system:"심업사상 Groupality 분석 AI. 순수 JSON만 반환. 마크다운 없이.",
            messages:[{role:"user",content:prompt}],
            tools:[{type:"web_search_20250305",name:"web_search"}]})
        });
        const d=await r.json();
        if(!r.ok) throw new Error(d.error?.message||r.status);
        const txt=d.content.filter(b=>b.type==="text").map(b=>b.text).join("");
        const m=txt.replace(/```json|```/g,"").match(/\{[\s\S]*\}/);
        if(!m) throw new Error("JSON 파싱 실패");
        return JSON.parse(m[0]);
      };
      setStep(1);
      const news=await call(`미·이란 전쟁 최신 뉴스 웹서치 후 요약. JSON: {"summary":"현황 2~3문장","tension":1~10,"key_developments":["뉴스 3개"]}`);
      setStep(2);
      const actors=await call(`미·이란 전쟁 행위자 분석. JSON: {"actors":[{"name":"","energy":0~100,"move":"","signal":""}],"dominant":""}`);
      setStep(3);
      const events=await call(`미·이란 전쟁 사건 분류. JSON: {"events":[{"type":"","title":"","intensity":0~100,"cross":""}],"trajectory":""}`);
      setStep(4);
      const price=await call(`미·이란 주가 시그널. JSON: {"overall":"BUY/SELL/WATCH","strength":0~100,"sectors":[{"name":"","signal":"","reason":""}],"mito":""}`);
      setStep(5);setResult({news,actors,events,price});setStatus("done");
    }catch(e){setError("오류: "+e.message);setStatus("idle");setStep(0);}
  }

  return(
    <div style={{padding:"16px 20px",animation:"fadeIn .3s"}}>
      <div style={{background:C.slate2,padding:"10px 16px",marginBottom:14,
        borderLeft:`4px solid ${C.gold}`,fontSize:".72rem",color:"#ccc",lineHeight:1.75}}>
        <strong style={{color:C.goldL}}>AI LIVE ANALYSIS</strong> —
        Anthropic API 키 입력 → Claude AI가 지금 이 순간 뉴스를 검색·분석하여
        심업사상 3축 시그널을 실시간 생성합니다.
        API 키 발급: <strong style={{color:C.goldL}}>platform.claude.com</strong>
      </div>
      <div style={{background:"white",border:"1px solid "+C.border,padding:"14px 16px",marginBottom:14}}>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:".65rem",color:C.mist,fontFamily:"monospace",whiteSpace:"nowrap"}}>API KEY</span>
          <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)}
            placeholder="sk-ant-api03-..."
            style={{flex:1,minWidth:220,padding:"8px 11px",border:"1px solid "+C.border,
              fontFamily:"monospace",fontSize:".73rem",background:C.cream,outline:"none"}}/>
          <button onClick={run} disabled={status==="loading"}
            style={{padding:"9px 20px",background:C.gold,color:"white",border:"none",
              fontWeight:700,cursor:"pointer",fontSize:".78rem",opacity:status==="loading"?.6:1}}>
            ▶ 실시간 분석
          </button>
        </div>
        {error&&<div style={{marginTop:8,fontSize:".68rem",color:C.red}}>{error}</div>}
      </div>
      <div style={{background:C.slate2,padding:"8px 16px",marginBottom:14,
        display:"flex",gap:10,flexWrap:"wrap",fontFamily:"monospace",fontSize:".6rem"}}>
        {steps.map((s,i)=>(
          <span key={i} style={{display:"flex",alignItems:"center",gap:3,
            opacity:i===step?1:i<step?.7:.3,color:i===step?C.goldL:i<step?C.green:"#aaa"}}>
            <span style={{width:5,height:5,borderRadius:"50%",background:"currentColor",display:"inline-block"}}/>
            {s}{i<steps.length-1&&<span style={{color:"#333",marginLeft:4}}>›</span>}
          </span>
        ))}
      </div>
      {status==="loading"&&(
        <div style={{textAlign:"center",padding:"48px 20px"}}>
          <div style={{width:32,height:32,border:"3px solid "+C.cream,borderTopColor:C.gold,
            borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 12px"}}/>
          <div style={{fontFamily:"monospace",fontSize:".7rem",color:C.mist}}>
            Claude AI가 실시간 뉴스를 수집·분석 중...
          </div>
        </div>
      )}
      {result&&status==="done"&&(
        <div style={{display:"flex",flexDirection:"column",gap:14,animation:"fadeIn .3s"}}>
          <div style={{background:"white",border:"1px solid "+C.border,padding:"14px 16px",borderLeft:`4px solid ${C.blue}`}}>
            <div style={{fontWeight:700,marginBottom:8}}>📰 최신 뉴스 요약</div>
            <div style={{fontSize:".73rem",lineHeight:1.8,marginBottom:8}}>{result.news.summary}</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={{fontSize:".63rem",fontFamily:"monospace",color:C.mist,minWidth:36}}>긴장도</span>
              <Bar val={result.news.tension*10} color={C.red} h={6}/>
              <span style={{fontFamily:"monospace",fontSize:".7rem",color:C.red,fontWeight:700}}>{result.news.tension}/10</span>
            </div>
            {(result.news.key_developments||[]).map((d,i)=>(
              <div key={i} style={{fontSize:".7rem",color:"#555",marginBottom:3}}>• {d}</div>
            ))}
          </div>
          <div style={{background:"white",border:"1px solid "+C.border,padding:"14px 16px",borderLeft:`4px solid ${C.ax1}`}}>
            <div style={{fontWeight:700,marginBottom:8}}>👤 행위자 에너지 — AI 분석</div>
            <div style={{fontSize:".68rem",color:C.mist,marginBottom:8}}>주도: {result.actors.dominant}</div>
            {(result.actors.actors||[]).map((a,i)=>(
              <div key={i} style={{marginBottom:9}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:".73rem",fontWeight:600}}>{a.name}</span>
                  <span style={{fontFamily:"monospace",fontSize:".7rem",color:C.gold,fontWeight:700}}>{a.energy}%</span>
                </div>
                <Bar val={a.energy} color={C.gold} h={6}/>
                <div style={{fontSize:".67rem",color:C.mist,marginTop:2}}>{a.signal}</div>
              </div>
            ))}
          </div>
          <div style={{background:"white",border:"1px solid "+C.border,padding:"14px 16px",borderLeft:`4px solid ${C.ax3}`}}>
            <div style={{fontWeight:700,marginBottom:8}}>📈 AI 주가 시그널</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <SigBadge sig={result.price.overall}/>
              <span style={{fontFamily:"monospace",fontSize:".7rem",color:C.mist}}>강도 {result.price.strength}%</span>
            </div>
            {(result.price.sectors||[]).map((s,i)=>(
              <div key={i} style={{marginBottom:5,padding:"6px 9px",background:"#f9f5ee",
                fontSize:".7rem",lineHeight:1.7,display:"flex",alignItems:"flex-start",gap:8}}>
                <span style={{fontWeight:700,minWidth:80}}>{s.name}</span>
                <SigBadge sig={s.signal}/>
                <span style={{color:"#555",flex:1}}>{s.reason}</span>
              </div>
            ))}
            {result.price.mito&&(
              <div style={{marginTop:10,padding:"9px 11px",background:C.goldBg,
                borderLeft:`3px solid ${C.gold}`,fontSize:".72rem",color:"#6b4c05",lineHeight:1.75}}>
                <strong>미토 원칙:</strong> {result.price.mito}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}
